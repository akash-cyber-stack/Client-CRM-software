<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <meta name="description" content="Sales Lead CRM — Google & Meta lead management, IVR calls, and follow-ups for Indian sales teams. Plans from ₹1,299/month." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://sales-crm-ipi.vercel.app/" />
    <title>Sales Lead CRM — Lead Management Software India</title>
    <script>
      (function () {
        if (location.hostname === 'ar-crm-iota.vercel.app') {
          location.replace(
            'https://ar-crm-iota-pi.vercel.app' +
              location.pathname +
              location.search +
              location.hash
          );
          return;
        }
        var t = localStorage.getItem('crm-theme') || 'dark';
        document.documentElement.classList.remove('light', 'dark');
        document.documentElement.classList.add(t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
